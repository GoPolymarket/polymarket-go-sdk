name: Weekly Compatibility Evidence

on:
  schedule:
    - cron: "15 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence:
    name: Build Compatibility Evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Generate compatibility evidence
        run: ./scripts/compatibility-evidence.sh --out-dir artifacts/compatibility
      - name: Upload compatibility artifact
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-evidence-${{ github.run_id }}
          path: artifacts/compatibility
          if-no-files-found: error
